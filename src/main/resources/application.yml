server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: goffer
  
  # MySQL 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/goffer?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
  
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  
  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.goffer.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: your-256-bit-secret-key-here-make-it-long-enough
  expiration: 86400000  # 24小时 (毫秒)
  header: Authorization
  prefix: Bearer

# LangChain4j 配置
langchain4j:
  open-ai:
    api-key: ${OPENAI_API_KEY:sk-xxx}
    model-name: gpt-4o
    base-url: https://api.openai.com/v1
  milvus:
    host: localhost
    port: 19530
    collection-name: goffer_embeddings

# Milvus 向量数据库配置
milvus:
  host: localhost
  port: 19530
  collection-name: goffer_embeddings
  dimension: 1536  # OpenAI embeddings 维度

# AWS S3 配置
aws:
  s3:
    endpoint: http://localhost:9000
    region: us-east-1
    bucket-name: goffer
    access-key: minioadmin
    secret-key: minioadmin
    path-style-access: true

# 日志配置
logging:
  level:
    com.goffer: debug
    dev.langchain4j: debug
